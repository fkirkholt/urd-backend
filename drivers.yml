sqlite:
    sqlite3:
        string: "database={path};check_same_thread=False"
        query: 'PRAGMA foreign_keys = ON'
        placeholder: '?'
    sqlean:
        string: "database={path};check_same_thread=False"
        query: 'PRAGMA foreign_keys = ON'
        placeholder: '?'
    duckdb:
        string: ''
        query: "ATTACH '{path}' (TYPE sqlite)"
        placeholder: '?'
    pyodbc:
        string: "Database={path};FKSupport=1;"
        placeholder: '?'
duckdb:
    duckdb:
        string: "{path}"
        placeholder: '?'
    pyodbc:
        string: "Database={path}"
        placeholder: '?'
mysql:
    # mysql.connector:
    #     string: "host={host};port={port};user={user};password={pass};database={dbname}"
    #     placeholder: '%s'
    #     options:
    #       buffered: true
    pymysql:
        string: "host={host};port={port};user={user};password={pass};database={dbname}"
        placeholder: '%s'
    pyodbc:
        string: "Server={host};Port={port};Uid={user};Pwd={pass};Database={dbname}"
        placeholder: '?'
mariadb:
    pymysql:
        string: "host={host};port={port};user={user};password={pass};database={dbname}"
        placeholder: '%s'
    # mysql.connector:
    #     string: "host={host};port={port};user={user};password={pass};database={dbname}"
    #     placeholder: '%s'
    #     options:
    #       buffered: true
    pyodbc:
        string: "Server={host};Port={port};Uid={user};Pwd={pass};Database={dbname}"
        placeholder: '?'
oracle:
    oracledb:
        string: "host={host};port={port};service_name={sid};user={user};password={pass};disable_oob=True"
        placeholder: colon-prefixed
    pyodbc:
        string: "DBQ={host}:{port}/{sid};Uid={user};Pwd={pass}"
        placeholder: '?'
mssql:
    pymssql:
        string: "host={host}\\{sid};port={port};user={user};password={pass};database={dbname}"
        placeholder: '%s'
    pyodbc:
        string: "Server={host}\\{sid};Port={port};Uid={user};Pwd={pass};Database={dbname};Encrypt=yes;MARS_Connection=yes;TrustServerCertificate=yes;"
        placeholder: '?'
postgresql:
    psycopg2:
        string: "host={host};port={port};user={user};password={pass};dbname={dbname}"
        dbname: postgres
        placeholder: '%s'
    pyodbc:
        string: "Server={host};Port={port};Uid={user};Pwd={pass};Database={dbname};"
        dbname: postgres
        placeholder: '?'
